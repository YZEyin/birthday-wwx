    function isBirthdayToday() {
        const now = new Date();
        const month = now.getMonth() + 1;
        const day = now.getDate();
        return month === BIRTH_MONTH && day === BIRTH_DAY;
    }

    function updateCountdown() {
        const now = new Date();
        let nextBirthday = new Date(now.getFullYear(), BIRTH_MONTH - 1, BIRTH_DAY);
        if (nextBirthday < now) {
            nextBirthday = new Date(now.getFullYear() + 1, BIRTH_MONTH - 1, BIRTH_DAY);
        }
        const diff = nextBirthday - now;
        if (diff <= 0 && isBirthdayToday()) {
            document.getElementById("countdownText").innerHTML = "🎉 今日是你的生日！信件已解锁 🎉";
            return;
        }
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (86400000)) / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        document.getElementById("countdownText").innerHTML = "📅 距离生日还有 " + days + "天 " + hours + "时 " + minutes + "分<br>⭐ 0点自动解锁信件 ⭐";
    }
